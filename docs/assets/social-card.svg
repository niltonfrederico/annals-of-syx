<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="Annals of Syx — GitHub social card">
  <title>Annals of Syx</title>
  <desc>GitHub social preview card. Babylonian-inspired terracotta and gold. Safe area is 80px from each edge.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a10"/>
      <stop offset="100%" stop-color="#1a100a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c068"/>
      <stop offset="100%" stop-color="#b88838"/>
    </linearGradient>
    <pattern id="brickwork" x="0" y="0" width="80" height="40" patternUnits="userSpaceOnUse">
      <rect width="80" height="40" fill="#3a2418" opacity="0.0"/>
      <rect x="0" y="0" width="78" height="18" fill="#4a2a18" opacity="0.18"/>
      <rect x="40" y="20" width="78" height="18" fill="#4a2a18" opacity="0.18"/>
      <rect x="-40" y="20" width="78" height="18" fill="#4a2a18" opacity="0.18"/>
    </pattern>
    <symbol id="wedge" viewBox="0 0 20 16">
      <polygon points="0,8 16,0 20,8 16,16" fill="url(#goldGrad)"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#brickwork)"/>

  <!-- Ornamental rails framing the safe area (80px margin all sides) -->
  <rect x="80" y="96"  width="1120" height="3" fill="url(#goldGrad)"/>
  <rect x="80" y="541" width="1120" height="3" fill="url(#goldGrad)"/>

  <!-- Cuneiform-inspired wedge friezes, top -->
  <g transform="translate(140,118)">
    <use href="#wedge" x="0"   y="0" width="24" height="18"/>
    <use href="#wedge" x="36"  y="0" width="24" height="18"/>
    <use href="#wedge" x="72"  y="0" width="24" height="18"/>
    <use href="#wedge" x="108" y="0" width="24" height="18"/>
    <use href="#wedge" x="144" y="0" width="24" height="18"/>
    <use href="#wedge" x="180" y="0" width="24" height="18"/>
  </g>
  <g transform="translate(936,118)">
    <use href="#wedge" x="0"   y="0" width="24" height="18"/>
    <use href="#wedge" x="36"  y="0" width="24" height="18"/>
    <use href="#wedge" x="72"  y="0" width="24" height="18"/>
    <use href="#wedge" x="108" y="0" width="24" height="18"/>
    <use href="#wedge" x="144" y="0" width="24" height="18"/>
    <use href="#wedge" x="180" y="0" width="24" height="18"/>
  </g>

  <!-- Title block -->
  <g text-anchor="middle">
    <text x="640" y="320"
          font-family="'Trajan Pro','Cinzel','Cormorant Garamond','Times New Roman',serif"
          font-size="104" font-weight="700" letter-spacing="14"
          fill="url(#goldGrad)"
          stroke="#6a3a18" stroke-width="1.3">
      ANNALS OF SYX
    </text>
    <text x="640" y="376"
          font-family="'Cinzel','Cormorant Garamond','Times New Roman',serif"
          font-size="26" font-weight="500" letter-spacing="12"
          fill="#c89868">
      a Songs of Syx save analyzer
    </text>
    <text x="640" y="436"
          font-family="'Cinzel','Cormorant Garamond','Times New Roman',serif"
          font-size="20" font-weight="400" letter-spacing="6"
          fill="#9a7048">
      headless engine bootstrap  ·  binary save  ·  JSON dump
    </text>
  </g>

  <!-- Bottom centered frieze -->
  <g transform="translate(496,498)">
    <use href="#wedge" x="0"   y="0" width="20" height="14"/>
    <use href="#wedge" x="28"  y="0" width="20" height="14"/>
    <use href="#wedge" x="56"  y="0" width="20" height="14"/>
    <use href="#wedge" x="84"  y="0" width="20" height="14"/>
    <use href="#wedge" x="112" y="0" width="20" height="14"/>
    <use href="#wedge" x="140" y="0" width="20" height="14"/>
    <use href="#wedge" x="168" y="0" width="20" height="14"/>
    <use href="#wedge" x="196" y="0" width="20" height="14"/>
    <use href="#wedge" x="224" y="0" width="20" height="14"/>
    <use href="#wedge" x="252" y="0" width="20" height="14"/>
    <use href="#wedge" x="280" y="0" width="20" height="14"/>
  </g>
</svg>
